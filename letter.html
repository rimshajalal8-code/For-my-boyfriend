<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Letter for You</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400&display=swap" rel="stylesheet">
    <style>
        body { background-color: #fff5f8; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; padding: 20px; font-family: 'Quicksand', sans-serif; }
        .letter { background: white; padding: 40px; border-radius: 5px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 400px; line-height: 1.8; color: #4a4a4a; position: relative; }
        .letter::before { content: '❤️'; position: absolute; top: -20px; left: 50%; transform: translateX(-50%); font-size: 2rem; }
        h2 { font-family: 'Dancing Script', cursive; color: #ff8fa3; text-align: center; }
        .back { margin-top: 30px; text-decoration: none; color: #ff8fa3; }
    </style>
</head>
<body>
    <div class="letter">
        <h2>To My Favorite Human,</h2>
        In a world full of temporary things, you are my forever. You're the peace in my chaos and the best decision I ever made. Thank you for being you. Happy Birthday, Baby!
    </div>
    <a href="index.html" class="back">← Back to Menu</a>
</body>
</html>
